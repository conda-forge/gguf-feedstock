context:
  name: gguf
  version: "0.19.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/gguf-${{ version }}.tar.gz
  sha256: dbadcd6cc7ccd44256f2229fe7c2dff5e8aa5cf0612ab987fd2b1a57e428923f

build:
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  number: 0
  python:
    entry_points:
      - gguf-convert-endian = gguf.scripts.gguf_convert_endian:main
      - gguf-dump = gguf.scripts.gguf_dump:main
      - gguf-set-metadata = gguf.scripts.gguf_set_metadata:main
      - gguf-new-metadata = gguf.scripts.gguf_new_metadata:main
      # gguf-editor-gui needs PySide6, which is intentionally not a run
      # dependency; install pyside6 manually to use the GUI editor.
      - gguf-editor-gui = gguf.scripts.gguf_editor_gui:main

requirements:
  host:
    - python >=3.10
    - pip
    - poetry-core
  run:
    - python >=3.10
    - numpy >=1.17
    - tqdm >=4.27
    - pyyaml >=5.1
    - requests >=2.25

tests:
  - python:
      imports:
        - gguf
  - script:
      - gguf-convert-endian --help
      - gguf-dump --help
      - gguf-set-metadata --help
      - gguf-new-metadata --help

about:
  homepage: https://ggml.ai
  summary: Read and write ML models in GGUF for GGML
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sodre
    - wolfv
